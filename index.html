<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Тренажёр Капчи</title>
		<style>
			body {
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100vh;
				background-color: #1a1a1a;
				color: white;
				margin: 0;
			}

			.container {
				background-color: #2d2d2d;
				padding: 30px;
				border-radius: 15px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
				text-align: center;
				width: 350px;
			}

			#captchaCanvas {
				background-color: #333;
				border-radius: 8px;
				margin-bottom: 20px;
				border: 2px solid #444;
				max-width: 100%;
			}

			.input-group {
				display: flex;
				flex-direction: column;
				gap: 10px;
				align-items: center;
			}

			input {
				padding: 12px;
				font-size: 1.2rem;
				border-radius: 8px;
				border: none;
				width: 80%;
				text-align: center;
				outline: none;
				background: #eee;
			}

			/* Стиль новой кнопки */
			.check-btn {
				padding: 12px 25px;
				font-size: 1rem;
				font-weight: bold;
				color: white;
				background-color: #4a90e2;
				border: none;
				border-radius: 8px;
				cursor: pointer;
				transition:
					background 0.2s,
					transform 0.1s;
				width: 87%;
			}

			.check-btn:hover {
				background-color: #357abd;
			}

			.check-btn:active {
				transform: scale(0.98);
			}

			.stats {
				margin-top: 20px;
				font-size: 0.9rem;
				color: #aaa;
			}

			.message {
				margin-top: 15px;
				height: 20px;
				font-weight: bold;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h2>Тренажёр ввода</h2>

			<canvas id="captchaCanvas" width="300" height="100"></canvas>

			<div class="input-group">
				<input type="text" id="userInput" placeholder="Введите код..." autocomplete="off" />
				<button class="check-btn" id="checkBtn">Проверить</button>
			</div>

			<div class="message" id="message"></div>

			<div class="stats">
				✅ Верно: <span id="score">0</span> | ❌ Ошибок: <span id="errors">0</span>
			</div>
		</div>

		<script>
			{
				const canvas = document.getElementById('captchaCanvas');
				const ctx = canvas.getContext('2d');
				const input = document.getElementById('userInput');
				const checkBtn = document.getElementById('checkBtn');
				const scoreEl = document.getElementById('score');
				const errorsEl = document.getElementById('errors');
				const messageEl = document.getElementById('message');

				let currentCaptcha = '';
				let score = 0;
				let errors = 0;

				function generateCaptcha() {
					currentCaptcha = '';
					ctx.clearRect(0, 0, canvas.width, canvas.height);

					// Шум
					for (let i = 0; i < 40; i++) {
						ctx.fillStyle = `rgba(${Math.random() * 255},${Math.random() * 255},${Math.random() * 255},0.15)`;
						ctx.beginPath();
						ctx.arc(
							Math.random() * canvas.width,
							Math.random() * canvas.height,
							Math.random() * 4,
							0,
							Math.PI * 2,
						);
						ctx.fill();
					}

					const chars = '0123456789';
					const colors = ['#e57373', '#ffb74d', '#81c784', '#64b5f6', '#ce93d8'];

					for (let i = 0; i < 5; i++) {
						const char = chars.charAt(Math.floor(Math.random() * chars.length));
						currentCaptcha += char;

						const fontSize = Math.floor(Math.random() * 15) + 40;
						const angle = (Math.random() - 0.5) * 0.5;
						const x = 40 + i * 45;
						const y = 60 + (Math.random() - 0.5) * 15;

						ctx.save();
						ctx.translate(x, y);
						ctx.rotate(angle);
						ctx.font = `bold ${fontSize}px "Courier New", Courier, monospace`;
						ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
						ctx.shadowBlur = 3;
						ctx.shadowColor = 'rgba(0,0,0,0.5)';
						ctx.fillText(char, 0, 0);
						ctx.restore();
					}

					// Помехи (линии)
					for (let i = 0; i < 4; i++) {
						ctx.strokeStyle = `rgba(255,255,255,0.1)`;
						ctx.lineWidth = 1;
						ctx.beginPath();
						ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
						ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
						ctx.stroke();
					}
				}

				// Главная функция проверки
				function checkResult() {
					const userValue = input.value.trim();

					if (userValue === '') return; // Игнорируем пустой ввод

					if (userValue === currentCaptcha) {
						score++;
						scoreEl.textContent = score;
						messageEl.style.color = '#81c784';
						messageEl.textContent = '✅ Верно!';
						input.value = '';
						generateCaptcha();
					} else {
						errors++;
						errorsEl.textContent = errors;
						messageEl.style.color = '#e57373';
						messageEl.textContent = `❌ Ошибка! Было: ${currentCaptcha}`;
						input.value = '';
						// generateCaptcha(); // Если хочешь новую капчу при ошибке — убери комментарий
					}
					input.focus(); // Возвращаем фокус на поле ввода
				}

				// Обработка кнопки
				checkBtn.addEventListener('click', checkResult);

				// Обработка Enter
				input.addEventListener('keypress', (e) => {
					if (e.key === 'Enter') checkResult();
				});

				generateCaptcha();
			}
		</script>
	</body>
</html>
