<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Тренажёр Капчи - Speed Test</title>
		<style>
			body {
				font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100vh;
				background-color: #1a1a1a;
				color: white;
				margin: 0;
			}

			.container {
				background-color: #2d2d2d;
				padding: 30px;
				border-radius: 15px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
				text-align: center;
				width: 360px;
			}

			#captchaCanvas {
				background-color: #333;
				border-radius: 8px;
				margin-bottom: 15px;
				border: 2px solid #444;
				display: block;
				margin-left: auto;
				margin-right: auto;
			}

			.input-group {
				display: flex;
				flex-direction: column;
				gap: 12px;
				align-items: center;
			}

			input {
				padding: 12px;
				font-size: 1.3rem;
				border-radius: 8px;
				border: 2px solid #444;
				width: 80%;
				text-align: center;
				outline: none;
				background: #eee;
				color: #222;
			}

			.check-btn {
				padding: 12px;
				font-size: 1.1rem;
				font-weight: bold;
				color: white;
				background-color: #4a90e2;
				border: none;
				border-radius: 8px;
				cursor: pointer;
				width: 87%;
			}

			.message {
				margin-top: 15px;
				height: 24px;
				font-weight: bold;
			}

			.stats-panel {
				margin-top: 20px;
				padding-top: 15px;
				border-top: 1px solid #444;
				color: #bbb;
			}

			.timer-box {
				font-size: 1.2rem;
				color: #4a90e2;
				margin-bottom: 10px;
			}

			/* Блок последних результатов */
			.history-panel {
				margin-top: 15px;
				background: #222;
				padding: 10px;
				border-radius: 8px;
				font-size: 0.85rem;
			}
			.history-title {
				color: #888;
				margin-bottom: 5px;
				text-transform: uppercase;
				font-size: 0.75rem;
				letter-spacing: 1px;
			}
			.history-item {
				display: flex;
				justify-content: space-between;
				padding: 4px 10px;
				border-bottom: 1px solid #333;
				animation: fadeIn 0.3s ease;
			}
			.history-item:last-child {
				border-bottom: none;
			}
			.h-code {
				color: #ffb74d;
				font-family: monospace;
				font-size: 1rem;
			}
			.h-time {
				color: #81c784;
				font-weight: bold;
			}

			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(-5px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<canvas id="captchaCanvas" width="300" height="100"></canvas>

			<div class="input-group">
				<input type="text" id="userInput" placeholder="Код здесь..." autocomplete="off" />
				<button class="check-btn" id="checkBtn">Проверить</button>
			</div>

			<div id="message" class="message"></div>

			<div class="stats-panel">
				<div class="timer-box">⏱ <span id="lastTime">0.00</span> сек</div>

				<div class="history-panel">
					<div class="history-title">Последние 3 результата</div>
					<div id="historyList">
						<div style="color: #555">История пуста</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			{
				const canvas = document.getElementById('captchaCanvas');
				const ctx = canvas.getContext('2d');
				const input = document.getElementById('userInput');
				const checkBtn = document.getElementById('checkBtn');
				const messageEl = document.getElementById('message');
				const lastTimeEl = document.getElementById('lastTime');
				const historyListEl = document.getElementById('historyList');

				let currentCaptcha = '';
				let startTime = Date.now();
				let timerInterval = null;
				let history = []; // Массив для хранения последних 3 результатов

				function updateRunningTimer() {
					const now = Date.now();
					lastTimeEl.textContent = ((now - startTime) / 1000).toFixed(2);
				}

				function generateCaptcha() {
					clearInterval(timerInterval);
					startTime = Date.now();
					timerInterval = setInterval(updateRunningTimer, 50);

					currentCaptcha = '';
					ctx.clearRect(0, 0, canvas.width, canvas.height);

					const chars = '0123456789';
					for (let i = 0; i < 5; i++) {
						const char = chars.charAt(Math.floor(Math.random() * chars.length));
						currentCaptcha += char;
						ctx.save();
						ctx.translate(35 + i * 50, 65 + (Math.random() - 0.5) * 15);
						ctx.rotate((Math.random() - 0.5) * 0.35);
						ctx.font = `bold ${Math.floor(Math.random() * 10) + 48}px Arial`;
						ctx.fillStyle = ['#e57373', '#ffb74d', '#81c784', '#64b5f6', '#ce93d8'][
							Math.floor(Math.random() * 5)
						];
						ctx.fillText(char, 0, 0);
						ctx.restore();
					}
				}

				function updateHistoryUI(code, time) {
					// Добавляем в начало массива
					history.unshift({ code, time });
					// Оставляем только 3 элемента
					if (history.length > 3) history.pop();

					historyListEl.innerHTML = history
						.map(
							(item) => `
            <div class="history-item">
                <span class="h-code">${item.code}</span>
                <span class="h-time">${item.time} сек</span>
            </div>
        `,
						)
						.join('');
				}

				function checkResult() {
					const userValue = input.value.trim();
					if (userValue === '') return;

					if (userValue === currentCaptcha) {
						clearInterval(timerInterval);
						const timeTaken = ((Date.now() - startTime) / 1000).toFixed(2);

						messageEl.style.color = '#81c784';
						messageEl.textContent = '✅ Верно!';

						updateHistoryUI(currentCaptcha, timeTaken);

						input.value = '';
						generateCaptcha();
					} else {
						messageEl.style.color = '#e57373';
						messageEl.textContent = `❌ Ошибка!`;
						input.value = '';
					}
					input.focus();
				}

				checkBtn.addEventListener('click', checkResult);
				input.addEventListener('keydown', (e) => {
					if (e.key === 'Enter') {
						e.preventDefault();
						checkResult();
					}
				});
				document.addEventListener('click', () => input.focus());

				generateCaptcha();
			}
		</script>
	</body>
</html>
